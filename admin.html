<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Coordenador</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-gray-800 rounded-3xl shadow-2xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6 flex items-center">
            <span class="mr-2">🛠️</span> Gerador de Escala
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Selecionar Data:</label>
                <select id="dataMissa" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl outline-none focus:border-blue-500 text-white"></select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Selecionar Horário:</label>
                <select id="horaMissa" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl outline-none focus:border-blue-500 text-white"></select>
            </div>
        </div>

        <button onclick="gerarEscala()" id="btnGerar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg mb-8">
            Analisar e Gerar Escala
        </button>

        <div id="resultadoEscala" class="hidden space-y-6">
            <div class="bg-gray-700 p-4 rounded-2xl border border-blue-500/30">
                <h3 class="text-blue-400 font-bold mb-3 flex justify-between italic">Sugestão de Escala</h3>
                <div id="listaFinal" class="text-sm space-y-2"></div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Observação:</label>
                <textarea id="obs" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl h-20 outline-none text-white" placeholder="Ex: Chegar 15 minutos antes..."></textarea>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center transition-all">
                <span class="mr-2">💬</span> Enviar no WhatsApp
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzyDSWSVz3TiNVB6YxflRpAlRVD6ox6D47T5pJGUWagjGEF9qX_idUOvQe1ZiZjl5ZdOg/exec";
        let escalaAtual = null;

        window.onload = async () => {
            const resp = await fetch(API_URL);
            const config = await resp.json();
            const comboData = document.getElementById('dataMissa');
            const comboHora = document.getElementById('horaMissa');
            
            comboData.innerHTML = config.config.datas.map(d => `<option value="${d}">${d}</option>`).join('');
            comboHora.innerHTML = config.config.horas.map(h => `<option value="${h}">${h}</option>`).join('');
        };

        async function gerarEscala() {
            const btn = document.getElementById('btnGerar');
            const data = document.getElementById('dataMissa').value;
            const hora = document.getElementById('horaMissa').value;

            btn.innerText = "Processando...";
            
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "gerarEscala", dataMissa: data, horaMissa: hora })
            });
            escalaAtual = await resp.json();

            const lista = document.getElementById('listaFinal');
            let html = "";
            const categorias = { "Acólitos": escalaAtual.acolitos, "Veteranos": escalaAtual.veteranos, "Médios": escalaAtual.medios, "Novatos": escalaAtual.novatos };

            for (const [label, pessoas] of Object.entries(categorias)) {
                html += `<div class="border-b border-gray-600 pb-2"><strong>${label}:</strong> `;
                html += pessoas.length > 0 ? pessoas.map(p => p.nome).join(', ') : '<span class="text-red-400 italic">Sem voluntários</span>';
                html += `</div>`;
            }

            lista.innerHTML = html;
            document.getElementById('resultadoEscala').classList.remove('hidden');
            btn.innerText = "Analisar e Gerar Escala";
        }

        function enviarWhatsApp() {
            const data = document.getElementById('dataMissa').value;
            const hora = document.getElementById('horaMissa').value;
            const obs = document.getElementById('obs').value;

            let texto = `*ESCALA DE COROINHAS*\n📅 Data: ${data}\n⏰ Hora: ${hora}h\n\n`;
            const categorias = { "Acólitos": escalaAtual.acolitos, "Veteranos": escalaAtual.veteranos, "Médios": escalaAtual.medios, "Novatos": escalaAtual.novatos };

            for (const [label, pessoas] of Object.entries(categorias)) {
                texto += `*${label}:* ${pessoas.map(p => p.nome).join(', ') || '---'}\n`;
            }
            if(obs) texto += `\n⚠️ *Obs:* ${obs}`;

            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
