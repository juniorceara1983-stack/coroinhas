<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4">
    <div class="max-w-3xl mx-auto space-y-6">
        
        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold text-green-400 mb-4 flex items-center">
                <span class="mr-2">👤</span> Cadastrar Coroinha
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="cadNome" placeholder="Nome Completo" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none focus:border-green-500 text-white">
                <select id="cadCat" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none text-white">
                    <option value="Acólito">Acólito</option>
                    <option value="Veterano">Veterano</option>
                    <option value="Médio">Médio</option>
                    <option value="Novato">Novato</option>
                </select>
                <button onclick="cadastrarMembro()" id="btnCad" class="bg-green-600 hover:bg-green-700 font-bold py-3 rounded-xl transition-all shadow-lg">Salvar</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl border-l-4 border-l-yellow-500">
            <h2 class="text-xl font-bold text-yellow-400 mb-4">📅 Gestão de Missas</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="tipoMissa" placeholder="Ex: 1º Domingo" class="p-3 bg-gray-700 rounded-xl border border-gray-600 text-white">
                <div class="flex gap-2">
                    <input type="date" id="novaDataMissa" class="flex-1 p-3 bg-gray-700 rounded-xl border border-gray-600 text-white">
                    <input type="time" id="novaHoraMissa" class="p-3 bg-gray-700 rounded-xl border border-gray-600 text-white">
                </div>
            </div>
            <button onclick="addMissa()" id="btnAddMissa" class="w-full bg-yellow-600 hover:bg-yellow-700 font-bold py-3 rounded-xl mb-6">Liberar no App</button>

            <div class="border-t border-gray-700 pt-4">
                <h3 class="text-xs font-bold text-gray-400 mb-3 uppercase">Missas Ativas (Toque para remover):</h3>
                <div id="listaRemover" class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto">
                    </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold text-blue-400 mb-6">🛠️ Gerar Escala do Dia</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="date" id="dataEscala" class="p-3 bg-gray-700 border border-gray-600 rounded-xl text-white">
                <input type="time" id="horaEscala" class="p-3 bg-gray-700 border border-gray-600 rounded-xl text-white">
            </div>
            <button onclick="gerarEscala()" id="btnGerar" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-2xl mb-6 shadow-lg">Sortear Disponíveis</button>
            
            <div id="resultadoEscala" class="hidden space-y-4">
                <div id="listaFinal" class="bg-gray-700 p-5 rounded-2xl border border-blue-500/30 text-sm space-y-4">
                    </div>
                <textarea id="obs" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl h-20 text-white outline-none" placeholder="Observações..."></textarea>
                <button onclick="enviarWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 font-bold py-4 rounded-2xl flex items-center justify-center transition-all shadow-lg text-white">
                    <span class="mr-2">💬</span> Enviar Escala no WhatsApp
                </button>
            </div>
        </div>

        <div class="bg-gray-900 p-4 rounded-2xl border border-red-900/50 text-center">
            <button onclick="limparDados()" class="text-red-500 text-xs font-bold uppercase tracking-widest hover:text-red-400">
                ⚠️ Limpar Disponibilidades do Mês
            </button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzyDSWSVz3TiNVB6YxflRpAlRVD6ox6D47T5pJGUWagjGEF9qX_idUOvQe1ZiZjl5ZdOg/exec";

        // --- FUNÇÕES DE CADASTRO ---
        async function cadastrarMembro() {
            const nome = document.getElementById('cadNome').value.trim();
            const cat = document.getElementById('cadCat').value;
            if(!nome) return alert("Digite o nome!");
            document.getElementById('btnCad').innerText = "...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "cadastrarMembro", nome, cat }) });
            alert("Coroinha Salvo!");
            document.getElementById('cadNome').value = "";
            document.getElementById('btnCad').innerText = "Salvar";
        }

        // --- GESTÃO DE MISSAS ---
        async function addMissa() {
            const tipo = document.getElementById('tipoMissa').value;
            const dataRaw = document.getElementById('novaDataMissa').value;
            const hora = document.getElementById('novaHoraMissa').value;
            if(!dataRaw || !hora) return alert("Preencha tudo!");
            const d = dataRaw.split("-");
            const dataFmt = tipo ? `${tipo} (${d[2]}/${d[1]})` : `${d[2]}/${d[1]}/${d[0]}`;
            document.getElementById('btnAddMissa').innerText = "...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "cadastrarMissa", dataMissa: dataFmt, horaMissa: hora}) });
            alert("Missa Liberada!");
            location.reload(); 
        }

        async function removerMissa(data, hora) {
            if(!confirm("Remover esta missa?")) return;
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "removerMissa", dataMissa: data, horaMissa: hora}) });
            location.reload();
        }

        async function carregarListaRemover() {
            const resp = await fetch(API);
            const data = await resp.json();
            let html = "";
            data.config.datas.forEach((d, i) => {
                const h = data.config.horas[i];
                html += `<div class="flex justify-between items-center bg-gray-700/50 p-2 rounded-lg text-xs border border-gray-600">
                    <span>${d} - ${h}h</span>
                    <button onclick="removerMissa('${d}', '${h}')" class="text-red-500 font-bold">Excluir</button>
                </div>`;
            });
            document.getElementById('listaRemover').innerHTML = html || "Nenhuma missa ativa.";
        }

        // --- ESCALA E WHATSAPP ---
        async function gerarEscala() {
            const dataRaw = document.getElementById('dataEscala').value;
            const hora = document.getElementById('horaEscala').value;
            if(!dataRaw || !hora) return alert("Selecione data/hora!");
            const d = dataRaw.split("-");
            const dataFmt = `${d[2]}/${d[1]}/${d[0]}`;
            document.getElementById('btnGerar').innerText = "Sorteando...";
            const resp = await fetch(API, { method: 'POST', body: JSON.stringify({ action: "gerarEscala", dataMissa: dataFmt, horaMissa: hora }) });
            const escala = await resp.json();

            let html = "";
            const categorias = { "Acólitos": escala.acolitos, "Veteranos": escala.veteranos, "Médios": escala.medios, "Novatos": escala.novatos };
            for (const [label, pessoas] of Object.entries(categorias)) {
                const nomes = pessoas.map(p => p.nome).join(', ');
                html += `<div><label class="text-xs font-bold text-gray-400 uppercase">${label}</label>
                <input type="text" class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg text-white escala-input" data-cat="${label}" value="${nomes}"></div>`;
            }
            document.getElementById('listaFinal').innerHTML = html;
            document.getElementById('resultadoEscala').classList.remove('hidden');
            document.getElementById('btnGerar').innerText = "Sortear Disponíveis";
        }

        function enviarWhatsApp() {
            const dataRaw = document.getElementById('dataEscala').value.split("-");
            const dataFmt = `${dataRaw[2]}/${dataRaw[1]}/${dataRaw[0]}`;
            const hora = document.getElementById('horaEscala').value;
            let texto = `*ESCALA DE COROINHAS*\n📅 ${dataFmt} | ⏰ ${hora}h\n\n`;
            document.querySelectorAll('.escala-input').forEach(i => {
                texto += `*${i.dataset.cat}:* ${i.value || '---'}\n`;
            });
            const obs = document.getElementById('obs').value;
            if(obs) texto += `\n⚠️ *Obs:* ${obs}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
        }

        async function limparDados() {
            if(confirm("Zerar TODAS as disponibilidades marcadas?")) {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "limparDisponibilidade"}) });
                alert("Dados Limpos!");
            }
        }

        window.onload = carregarListaRemover;
    </script>
</body>
</html>
