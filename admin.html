<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body>
    <div class="container mx-auto">
        <h1 class="text-3xl font-bold">Painel Admin</h1>
        
        <form id="coroinhaForm">
            <input type="text" placeholder="Nome do Coroinha" required class="border rounded p-2">
            <button type="submit" class="bg-blue-500 text-white rounded p-2">Cadastrar Coroinha</button>
        </form>
        <button id="cadastrarMissa" class="bg-green-500 text-white rounded p-2">Cadastrar Missa</button>
        <button id="gerarEscala" class="bg-yellow-500 text-white rounded p-2">Gerar Escala</button>
        <button id="whatsappButton" class="bg-purple-500 text-white rounded p-2">Enviar WhatsApp</button>
        <button id="limparDisponibilidadeButton" class="bg-red-500 text-white rounded p-2">Limpar Disponibilidade</button>
    </div>

    <script>
        const apiURL = "<YOUR_API_URL>"; // Existing API URL

        document.getElementById('whatsappButton').addEventListener('click', () => {
            const coroinhas = getSelectedCoroinhas();
            const message = createWhatsAppMessage(coroinhas);
            sendWhatsAppMessage(message);
        });

        document.getElementById('limparDisponibilidadeButton').addEventListener('click', async () => {
            await fetch(apiURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: "limparDisponibilidade" })
            });
            clearUIState();
        });

        function getSelectedCoroinhas() {
            // Code to fetch selected coroinhas' names only
        }

        function createWhatsAppMessage(coroinhas) {
            const dateTime = new Date().toLocaleString();
            const observations = 'Algumas observações...'; // If any
            const flattenedNames = [...new Set(coroinhas)]; // Deduplicate names
            return `Coroinhas: ${flattenedNames.join(', ')}\nData/Hora: ${dateTime}\n${observations}`;
        }

        function sendWhatsAppMessage(message) {
            // Function to send message via WhatsApp
        }

        function clearUIState() {
            // Function to clear the UI state
        }
    </script>
</body>
</html>
