<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo para centralizar e animar o Modal */
        #modalLoading {
            display: none; /* Começa escondido */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); /* Fundo escuro */
            z-index: 9999;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #modalLoading.show { display: flex; opacity: 1; }
        .modal-content {
            background: #1f2937; /* Mesma cor do painel bg-gray-800 */
            padding: 30px; border-radius: 24px;
            width: 90%; max-w-sm; text-center;
            border: 2px solid #374151; /* bg-gray-700 */
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }
        /* Ícone de carregar simples */
        .loader {
            border: 4px solid #374151; border-top: 4px solid #10b981; /* bg-emerald-500 */
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-4">

    <div id="modalLoading">
        <div class="modal-content">
            <img src="https://image.api.ai.google.com/9788d648-5c4e-11ef-932b-98039b1a5105.jpg" alt="Padre Luciano" class="w-24 h-24 mx-auto rounded-full border-4 border-gray-600 mb-5 shadow-lg object-cover">
            <p id="fraseDoDia" class="text-sm text-gray-300 italic mb-2 leading-relaxed font-serif"></p>
            <div class="loader"></div>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Processando...</p>
        </div>
    </div>

    <div class="max-w-3xl mx-auto space-y-6">
        
        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold text-green-400 mb-4 flex items-center">
                <span class="mr-2">👤</span> Cadastrar Coroinha
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="cadNome" placeholder="Nome Completo" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none focus:border-green-500 text-white w-full">
                <select id="cadCat" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none text-white w-full">
                    <option value="Acólito">Acólito</option>
                    <option value="Veterano">Veterano</option>
                    <option value="Médio">Médio</option>
                    <option value="Novato">Novato</option>
                </select>
                <button onclick="chamarComModal(cadastrarMembro)" id="btnCad" class="bg-green-600 hover:bg-green-700 font-bold py-3 rounded-xl transition-all shadow-lg text-white w-full">Salvar</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl border-l-4 border-l-yellow-500">
            <h2 class="text-xl font-bold text-yellow-400 mb-4 flex items-center">
                <span class="mr-2">📅</span> Abrir Novas Datas de Missa
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="date" id="novaDataMissa" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none focus:border-yellow-500 text-white w-full">
                <input type="time" id="novaHoraMissa" class="bg-gray-700 border border-gray-600 p-3 rounded-xl outline-none focus:border-yellow-500 text-white w-full">
                <button onclick="chamarComModal(addMissa)" id="btnAddMissa" class="bg-yellow-600 hover:bg-yellow-700 font-bold py-3 rounded-xl transition-all shadow-lg text-white w-full">Liberar</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold text-blue-400 mb-6 flex items-center">
                <span class="mr-2">🛠️</span> Gerar Escala do Dia
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-sm">
                <div>
                    <label class="block text-gray-500 mb-1">Data:</label>
                    <input type="date" id="dataEscala" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">Horário:</label>
                    <input type="time" id="horaEscala" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
            </div>
            <button onclick="chamarComModal(gerarEscala)" id="btnGerar" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-2xl mb-6 transition-all shadow-lg text-white">Sortear Disponíveis</button>
            
            <div id="resultadoEscala" class="hidden space-y-4">
                <div id="listaFinal" class="bg-gray-700 p-5 rounded-2xl border border-blue-500/30 text-sm space-y-4"></div>
                <button onclick="enviarWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 font-bold py-4 rounded-2xl flex items-center justify-center transition-all shadow-lg text-white">
                    <span class="mr-2">💬</span> Enviar Escala no WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzyDSWSVz3TiNVB6YxflRpAlRVD6ox6D47T5pJGUWagjGEF9qX_idUOvQe1ZiZjl5ZdOg/exec";

        // LISTA DE FRASES DO PADRE LUCIANO / BÍBLICAS
        const frases = [
            "\"Tudo o que pedirdes em oração, crede que recebestes.\"",
            "\"A oração é o respirar da alma, busque a Deus sempre.\"",
            "\"Sirva ao Senhor com alegria e Ele guiará seus passos.\"",
            "\"Pai, em Tuas mãos entrego o meu espírito.\"",
            "São Francisco: \"Onde houver ódio, que eu leve o amor.\"",
            "\"O Senhor é meu pastor, nada me faltará.\"",
            "Santo Agostinho: \"Nossa alma só descansa em Ti.\"",
            "\"Eis-me aqui, envia-me a mim.\"",
            "\"Amarás o teu próximo como a ti mesmo.\"",
            "São João Paulo II: \"Não tenhais medo de abrir as portas a Cristo.\""
        ];

        // FUNÇÃO PARA MOSTRAR MODAL E EXECUTAR AÇÃO
        async function chamarComModal(funcaoAcao) {
            const modal = document.getElementById('modalLoading');
            const pFrase = document.getElementById('fraseDoDia');
            
            // Escolhe frase aleatória
            const indice = Math.floor(Math.random() * frases.length);
            pFrase.innerText = frases[indice];
            
            // Mostra Modal
            modal.classList.add('show');
            
            // Garante que o modal apareça por pelo menos 1.5 segundos
            const delay = new Promise(resolve => setTimeout(resolve, 1500));
            
            try {
                // Executa a função do botão (cadastrar, add, sortear)
                await Promise.all([funcaoAcao(), delay]);
            } finally {
                // Esconde Modal no fim (mesmo com erro)
                modal.classList.remove('show');
            }
        }

        // --- FUNÇÕES COMPLEMENTARES (Originais) ---
        async function cadastrarMembro() {
            const nome = document.getElementById('cadNome').value.trim();
            const cat = document.getElementById('cadCat').value;
            if(!nome) return alert("Digite o nome!");
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "cadastrarMembro", nome, cat }) });
            alert("Salvo!");
            location.reload();
        }

        async function addMissa() {
            const dataRaw = document.getElementById('novaDataMissa').value;
            const hora = document.getElementById('novaHoraMissa').value;
            if(!dataRaw || !hora) return alert("Preencha tudo!");
            const d = dataRaw.split("-");
            const dataFmt = `${d[2]}/${d[1]}/${d[0]}`;
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "cadastrarMissa", dataMissa: dataFmt, horaMissa: hora}) });
            alert("Missa Liberada!");
            location.reload();
        }

        async function gerarEscala() {
            const dataRaw = document.getElementById('dataEscala').value;
            const hora = document.getElementById('horaEscala').value;
            if(!dataRaw || !hora) return alert("Selecione data/hora!");
            const d = dataRaw.split("-");
            const dataFmt = `${d[2]}/${d[1]}/${d[0]}`;
            
            const resp = await fetch(API, { method: 'POST', body: JSON.stringify({ action: "gerarEscala", dataMissa: dataFmt, horaMissa: hora }) });
            const escala = await resp.json();

            let html = "";
            const categorias = { "Acólitos": escala.acolitos, "Veteranos": escala.veteranos, "Médios": escala.medios, "Novatos": escala.novatos };
            for (const [label, pessoas] of Object.entries(categorias)) {
                html += `<div class="p-2 border border-gray-600 rounded-lg text-xs"><strong class="text-blue-300 uppercase">${label}:</strong> ${pessoas.length > 0 ? pessoas.map(p => p.nome).join(', ') : '---'}</div>`;
            }
            document.getElementById('listaFinal').innerHTML = html;
            document.getElementById('resultadoEscala').classList.remove('hidden');
        }

        function enviarWhatsApp() {
            const dataRaw = document.getElementById('dataEscala').value.split("-");
            const dataFmt = `${dataRaw[2]}/${dataRaw[1]}/${dataRaw[0]}`;
            const hora = document.getElementById('horaEscala').value;
            let texto = `*ESCALA DE COROINHAS*\n📅 ${dataFmt} | ⏰ ${hora}h\n\n`;
            
            const cats = document.getElementById('listaFinal').querySelectorAll('strong');
            cats.forEach(c => { texto += `*${c.innerText}* ${c.nextSibling.textContent}\n`; });
            
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
        }
    </script>
</body>
</html>
