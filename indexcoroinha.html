<div id="etapa1">
    <input type="text" id="nomeInput" placeholder="Digite seu nome exato">
    <button onclick="validarNome()">Entrar</button>
</div>

<div id="etapa2" style="display:none">
    <h3>Selecione as Missas que pode servir:</h3>
    <div id="listaMissas">
        <label><input type="checkbox" class="missa" data-d="12/04" data-h="08:00"> 12/04 - 08h</label><br>
        <label><input type="checkbox" class="missa" data-d="12/04" data-h="19:00"> 12/04 - 19h</label>
    </div>
    <button onclick="enviar()">Enviar Disponibilidade</button>
</div>

<script>
async function validarNome() {
    const nome = document.getElementById('nomeInput').value;
    const resp = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({action: "verificarNome", nome: nome})
    });
    const result = await resp.json();
    if(result.existe) document.getElementById('etapa2').style.display='block';
    else alert("Nome não encontrado na lista oficial!");
}
</script>
