<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Coroinha</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">
        <div id="loginArea" class="text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 text-blue-600 italic">⛪ Acesso Coroinha</h1>
            <input type="text" id="nomeInput" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-4 text-center focus:border-blue-500 outline-none" placeholder="Digite seu nome igual na lista">
            <button onclick="validarNome()" id="btnEntrar" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg">Entrar</button>
        </div>
        <div id="dispoArea" class="hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Selecione suas datas:</h2>
            <div id="listaMissas" class="space-y-3 mb-6 max-h-72 overflow-y-auto"></div>
            <button onclick="enviarDispo()" id="btnEnviar" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl hover:bg-green-700 transition-all shadow-lg">Confirmar Presença</button>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzyDSWSVz3TiNVB6YxflRpAlRVD6ox6D47T5pJGUWagjGEF9qX_idUOvQe1ZiZjl5ZdOg/exec";
        let nomeUsuario = "";

        async function validarNome() {
            const nome = document.getElementById('nomeInput').value.trim();
            if(!nome) return alert("Digite seu nome!");
            document.getElementById('btnEntrar').innerText = "Verificando...";
            const resp = await fetch(`${URL_API}?nome=${encodeURIComponent(nome)}`);
            const data = await resp.json();
            if(data.existe) { 
                nomeUsuario = nome; 
                carregarMissas(data.config); 
            } else { 
                alert("Nome não encontrado! Digite exatamente como o coordenador cadastrou."); 
                document.getElementById('btnEntrar').innerText = "Entrar";
            }
        }

        function carregarMissas(config) {
            let html = "";
            config.datas.forEach(d => { config.horas.forEach(h => {
                html += `<label class="flex items-center p-4 border rounded-2xl hover:bg-blue-50 cursor-pointer transition-all">
                    <input type="checkbox" class="missa-item w-5 h-5 text-blue-600" data-d="${d}" data-h="${h}">
                    <span class="ml-3 text-sm font-bold text-gray-700">${d} - ${h}h</span>
                </label>`;
            });});
            document.getElementById('listaMissas').innerHTML = html;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('dispoArea').classList.remove('hidden');
        }

        async function enviarDispo() {
            const checks = document.querySelectorAll('.missa-item:checked');
            if(checks.length === 0) return alert("Selecione uma data!");
            const selecoes = Array.from(checks).map(i => ({data: i.dataset.d, hora: i.dataset.h}));
            document.getElementById('btnEnviar').innerText = "Enviando...";
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "salvarDisponibilidade", nome: nomeUsuario, selecoes}) });
            document.getElementById('dispoArea').innerHTML = "<div class='text-center py-10 text-green-600 font-bold'>✅ Presença enviada!</div>";
        }
    </script>
</body>
</html>
