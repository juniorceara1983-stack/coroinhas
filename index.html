<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Coroinhas - Disponibilidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .pwa-card { max-width: 400px; margin: 20px auto; }
    </style>
</head>
<body class="p-4">

    <div class="pwa-card bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-center text-blue-700 mb-6">Minha Disponibilidade</h1>
        
        <form id="formDisponibilidade" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Seu Nome</label>
                <input type="text" id="nome" required placeholder="Digite seu nome completo"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Sua Categoria</label>
                <select id="categoria" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option value="Acólito">Acólito</option>
                    <option value="Experiente">Experiente</option>
                    <option value="Médio">Médio</option>
                    <option value="Novato">Novato</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Data da Missa</label>
                <input type="date" id="dataMissa" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
            </div>

            <button type="submit" id="btnEnviar"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                Confirmar Presença
            </button>
        </form>

        <div id="mensagem" class="mt-4 text-center hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxxivzWDFzWLiPKiBKmo_Bn1fIGuy5h5YhPa_hEZPARuMGT8Maqd5YfRcBGEjO0z7zLjg/exec";

        document.getElementById('formDisponibilidade').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnEnviar');
            const msg = document.getElementById('mensagem');
            
            btn.disabled = true;
            btn.innerText = "Enviando...";
            btn.classList.replace('bg-blue-600', 'bg-gray-400');

            const payload = {
                action: "enviarDisponibilidade",
                nome: document.getElementById('nome').value,
                categoria: document.getElementById('categoria').value,
                dataMissa: document.getElementById('dataMissa').value
            };

            try {
                // Usando o modo 'no-cors' para evitar problemas comuns de redirecionamento do Google Script
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                msg.innerText = "✅ Disponibilidade enviada com sucesso!";
                msg.classList.remove('hidden', 'bg-red-100', 'text-red-700');
                msg.classList.add('bg-green-100', 'text-green-700');
                document.getElementById('formDisponibilidade').reset();

            } catch (error) {
                msg.innerText = "❌ Erro ao enviar. Tente novamente.";
                msg.classList.remove('hidden', 'bg-green-100', 'text-green-700');
                msg.classList.add('bg-red-100', 'text-red-700');
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Presença";
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });
    </script>
</body>
</html>
